<!DOCTYPE html>
<html>
<head>

    <title>Register</title>

    <link rel="stylesheet"
    href="/static/auth.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <div class="logo">
            AI Forex
        </div>

        <div class="subtitle">
            Create your trading account
        </div>

        <form method="POST">

            <input
            type="text"
            name="username"
            placeholder="Username"
            required>

            <input
            type="password"
            name="password"
            placeholder="Password"
            required>

            <button type="submit">
                Register
            </button>

        </form>

        <div class="auth-link">

            <a href="/login">
                Already have account?
            </a>

        </div>

    </div>

</div>

</body>
</html>
